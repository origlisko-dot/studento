# Render Blueprint — one-click deploy of the Telegram TV Cast backend.
# 1. Push this repo to GitHub.
# 2. In Render: New > Blueprint, pick this repo.
# 3. Set BOT_TOKEN (your public bot token). BOT_USERNAME is prefilled below.
# 4. Deploy. PUBLIC_URL is auto-detected from RENDER_EXTERNAL_URL and the
#    Telegram webhook is registered automatically on startup.
services:
  - type: web
    name: telegram-tv-cast
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        value: TV_TO_TELEGRAMbot
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
